# yaml-language-server: $schema=https://cubic.dev/schema/cubic-repository-config.schema.json

version: 1

reviews:
  enabled: true
  sensitivity: high
  incremental_commits: true
  check_drafts: false
  external_contributors_require_manual_review: true
  resolve_threads_when_addressed: true

  # Stamp PRs when cubic judges them low-risk. `live` actually posts the
  # approval (vs `shadow` which only previews it). External-contributor
  # PRs still require manual trigger via the setting above.
  auto_approve_behavior: live
  auto_approve: low_risk_only

  # Even when cubic deems a change low-risk, never rubber-stamp changes
  # to the build/release surface — those need a human eyeball.
  auto_approve_rules:
    exclude:
      - ".github/workflows/**"
      - ".github/dependabot.yml"
      - "cubic.yaml"
      - "biome.json"
      - "tsconfig.json"
      - "package.json"
      - "bun.lock"
      - ".changeset/config.json"
      - "LICENSE"
      - "skills/**"

  custom_instructions: |
    Project conventions are documented in AGENTS.md and CONTRIBUTING.md;
    apply them when reviewing.

    Review summary requirements (cubic.yaml has no native PR-score field,
    so request this in the summary text). cubic-loop keys off this line —
    do not omit or reformat it:
    - Begin every review summary with a single line of the form
      `PR score: N/10` where N is your overall confidence that the PR is
      safe to merge as-is (10 = ship it, 1 = blocking issues).
    - Follow with a one-sentence justification of the score.
    - Then list issues as usual.

    Quality gates that block merge:
    - `bun run check` (Biome lint + bun test) must exit 0
    - `bunx tsc --noEmit` must exit 0
    - Tests added/updated for any behavior change in `src/`
    - Changeset entry (`bun run changeset`) for user-visible changes;
      skip for docs-only or chore PRs (see .github/PULL_REQUEST_TEMPLATE.md)

    Code style (enforced by Biome 2.4, biome.json):
    - 2-space indent, double quotes, semicolons
    - No `console.log` in runtime code (`noConsole` is an error)
    - No `any`; strict mode + `noUncheckedIndexedAccess` are on
    - Files: kebab-case.ts; tests colocated as <source>.test.ts
    - Prefer Bun-native APIs (Bun.file, Bun.write, Bun.YAML.parse, Bun.spawn)

    Skill changes (`skills/cubic-loop/**`) are user-facing — they alter
    how the cubic-loop skill behaves when invoked. Flag prose changes
    that materially change behavior and confirm a Changeset entry is
    included for them.

    Runtime scope discipline (applies to running code / dispatched agents,
    not to normal source edits):
    - Runtime writes stay inside the project root (this repo's working tree).
    - Inside the repo, runtime/generated state belongs under standard build
      dirs (`dist/`, `coverage/`, `node_modules/`) — avoid scattering
      generated files elsewhere.

  ignore:
    files:
      # Lockfile — diff is noise; reviewing dependency updates happens via
      # the Dependabot PR's package.json diff.
      - "bun.lock"
      # Auto-managed by Changesets; review the .changeset/*.md entries
      # in feature PRs instead.
      - "CHANGELOG.md"
      # Vendored dependencies and build output.
      - "node_modules/**"
      - "dist/**"
      - "build/**"
      - "coverage/**"
    pr_labels:
      - skip-review
      - dependencies
    pr_titles:
      # Auto-generated "Version Packages" PR from the Changesets action.
      - "^chore: version packages"

pr_descriptions:
  generate: true
  instructions: |
    Follow the structure in .github/PULL_REQUEST_TEMPLATE.md
    (Description / Related Issues / Changesets / Quality Gates /
    Skill Changes). Keep the summary focused on user-visible impact and
    the "why" of the change rather than a file-by-file recap.

issues:
  fix_with_cubic_buttons: true
  pr_comment_fixes: true
  fix_commits_to_pr: true
