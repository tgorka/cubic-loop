name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned so release tagging/versioning stays reproducible across
          # Bun upgrades. Bump deliberately; keep in sync with the version
          # used in local dev (`bun --version`).
          bun-version: 1.3.12

      - name: Install dependencies (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: Lint + test
        run: bun run check

      - name: Create release PR or tag
        uses: changesets/action@v1
        with:
          version: bun run changeset version
          publish: bun run changeset tag
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
